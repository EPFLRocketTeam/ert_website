<div class="contact-wrapper">
  <form id="contactForm" novalidate>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us what's on your mind..." rows="5" required></textarea>
    </div>

    <div class="cf-turnstile" data-sitekey="{{ .Site.Params.turnstileSitekey }}" data-callback="onSubmitForm"></div>

    <button id="submitButton" type="submit" disabled>
      <span class="btn-text">SEND</span>
      <span class="btn-spinner" aria-hidden="true"></span>
    </button>

    <div id="formStatus" class="form-status" role="alert" aria-live="polite"></div>
  </form>

  <div class="contact-email-links">
    <p>Or reach us directly:</p>
    <a href="mailto:info@epflrocketteam.ch" class="email-link">
      <img src="/icons/mail.svg" alt="" class="mail-icon"> General inquiries
    </a>
    <a href="mailto:presidency@epflrocketteam.ch" class="email-link">
      <img src="/icons/mail.svg" alt="" class="mail-icon"> Presidency
    </a>
  </div>
</div>
